<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}">
    <title>Company</title>
</head>
<body class="bg-black text-white overflow-x-hidden">

<nav th:replace="~{fragments/nav :: nav}"></nav>

<!-- 히어로 -->
<section class="h-screen flex flex-col justify-center px-20">
    <p class="text-gray-500 tracking-widest text-sm mb-4">WHERE I WORKED</p>
    <h1 class="text-8xl font-bold hero-title">경력</h1>
</section>

<!-- 업체 목록 -->
<section class="px-20 py-32">
    <div id="company-list" class="flex flex-col gap-0"></div>
</section>

<script src="/js/main.js"></script>
<script>
    async function loadCompanies() {
        const res = await fetch('/api/company');
        const data = await res.json();
        const list = document.getElementById('company-list');
        data.forEach((item, index) => {
            list.innerHTML += `
                    <div class="border-t border-zinc-800 py-10 group cursor-pointer hover:px-6 transition-all duration-300">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-gray-600 text-sm">${String(index + 1).padStart(2, '0')}</span>
                                <h2 class="text-4xl font-bold mt-2 group-hover:text-gray-300 transition">${item.name}</h2>
                                <p class="text-gray-500 mt-4">${item.description || ''}</p>
                            </div>
                            <p class="text-gray-500 text-sm">${item.period || ''}</p>
                        </div>
                    </div>
                `;
        });
    }
    loadCompanies();
</script>
</body>
</html>
